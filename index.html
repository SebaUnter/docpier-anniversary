:root {
  --dp-purple: #4d36d9;
  --dp-green:  #3BF573;
  --dp-black:  #000000;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  width:100vw; height:100dvh;
  overflow:hidden; background:#000;
  touch-action:manipulation;
}

#video {
  position:fixed; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  opacity:0; transition:opacity 0.6s;
}
#video.on { opacity:1; }
#sc { display:none; }

#fw { position:fixed; inset:0; z-index:40; pointer-events:none; }

/* ── NO TAP SCREEN – kamera startet automatisch ── */
#loading {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#000; z-index:90;
  transition:opacity 0.6s;
}
#loading.gone { opacity:0; pointer-events:none; }

.tap-logo { display:flex; align-items:center; gap:8px; }
.tap-logo .dot { width:10px; height:10px; background:var(--dp-green); border-radius:50%; }
.tap-logo span {
  font-family:'Figtree', sans-serif;
  font-size:1.15rem; font-weight:700; color:#fff; letter-spacing:-.02em;
}

/* ── AR BRACKETS ── */
#ar {
  position:fixed; inset:0; z-index:20;
  pointer-events:none; opacity:0; transition:opacity 0.4s;
}
#ar.on { opacity:1; }

.vf {
  position:absolute; top:50%; left:50%;
  width:min(88vw, 61vh); aspect-ratio:210/297;
  transform:translate(-50%, -52%);
}
.c {
  position:absolute; width:22px; height:22px;
  border-color:rgba(59,245,115,0.5); border-style:solid;
  transition:border-color 0.3s;
}
.c.tl{top:0;left:0;border-width:2px 0 0 2px}
.c.tr{top:0;right:0;border-width:2px 2px 0 0}
.c.bl{bottom:0;left:0;border-width:0 0 2px 2px}
.c.br{bottom:0;right:0;border-width:0 2px 2px 0}
.vf.locked .c { border-color:var(--dp-green); }

.sl {
  position:absolute; left:0; right:0; height:1.5px;
  background:linear-gradient(90deg,transparent,var(--dp-green),transparent);
  box-shadow:0 0 10px var(--dp-green);
  animation:sl 2.2s ease-in-out infinite;
}
.vf.locked .sl { display:none; }
@keyframes sl { 0%{top:0%;opacity:0}6%{opacity:1}94%{opacity:1}100%{top:100%;opacity:0} }

/* ── TEXT OVERLAY ── */
#overlay {
  position:fixed; inset:0; z-index:30;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
}

#content {
  width:min(88vw, 61vh);
  aspect-ratio:210/297;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  opacity:0;
  transform:perspective(900px) rotateX(14deg) scale(0.88);
  transition:
    opacity .65s cubic-bezier(.34,1.3,.64,1),
    transform .65s cubic-bezier(.34,1.3,.64,1);
}
#content.show {
  opacity:1;
  transform:perspective(900px) rotateX(2deg) scale(1);
}

/* Normal mode */
.n-days {
  font-family:'GTFlexaExpanded', 'Figtree', sans-serif;
  font-size:clamp(4.5rem, 22vw, 11rem);
  font-weight:900;
  color:var(--dp-purple);
  letter-spacing:-0.02em;
  line-height:0.88;
  text-align:center;
  display:block;
}
.n-label {
  font-family:'Figtree', sans-serif;
  font-size:clamp(1rem, 5vw, 2.5rem);
  font-weight:700;
  color:var(--dp-black);
  letter-spacing:-0.01em;
  text-align:center;
  margin-top:0.2em;
  display:block;
}

/* Jubiläum mode */
.j-wrap {
  display:none;
  flex-direction:column;
  align-items:center;
}
.j-congrats {
  font-family:'GTFlexaBold', 'Figtree', sans-serif;
  font-size:clamp(1.1rem, 5.2vw, 2.6rem);
  font-weight:700;
  color:var(--dp-black);
  text-align:center;
  letter-spacing:-0.01em;
  line-height:1.15;
  display:block;
}
.j-years {
  font-family:'GTFlexaExpanded', 'Figtree', sans-serif;
  font-size:clamp(4rem, 19vw, 9.5rem);
  font-weight:900;
  color:var(--dp-purple);
  letter-spacing:-0.02em;
  line-height:0.88;
  text-align:center;
  margin-top:0.12em;
  display:block;
}
.j-label {
  font-family:'Figtree', sans-serif;
  font-size:clamp(1rem, 5vw, 2.5rem);
  font-weight:700;
  color:var(--dp-black);
  letter-spacing:-0.01em;
  text-align:center;
  margin-top:0.2em;
  display:block;
}

#content.jubilee .j-wrap  { display:flex; }
#content.jubilee .n-days,
#content.jubilee .n-label { display:none; }

/* Kamera-Fehler Hinweis */
#cam-hint {
  position:fixed; bottom:2rem; left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:100px;
  padding:0.5rem 1.2rem;
  font-family:'Figtree',sans-serif;
  font-size:0.72rem; font-weight:500;
  color:rgba(255,255,255,0.4);
  letter-spacing:0.03em;
  white-space:nowrap;
  z-index:25;
  opacity:0; transition:opacity 0.4s;
  pointer-events:none;
}
#cam-hint.on { opacity:1; }
</style>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="sc"></canvas>
<canvas id="fw"></canvas>

<!-- Minimales Loading (verschwindet sobald Kamera startet) -->
<div id="loading">
  <div class="tap-logo"><span class="dot"></span><span>docpier</span></div>
</div>

<div id="ar">
  <div class="vf" id="vf">
    <div class="c tl"></div><div class="c tr"></div>
    <div class="c bl"></div><div class="c br"></div>
    <div class="sl"></div>
  </div>
</div>

<div id="overlay">
  <div id="content">
    <span class="n-days"  id="n-days">—</span>
    <span class="n-label">Tage Docpier</span>
    <div class="j-wrap">
      <span class="j-congrats">Herzliche<br>Gratulation!</span>
      <span class="j-years" id="j-years">1</span>
      <span class="j-label" id="j-label">Jahr Docpier</span>
    </div>
  </div>
</div>

<div id="cam-hint">A4-Blatt ausrichten</div>

<script>
const FOUNDING = new Date('2025-04-01T00:00:00');

function isAnniversary() {
  const n = new Date();
  return n.getMonth() === 3 && n.getDate() === 1 && n.getFullYear() > 2025;
}

function updateContent() {
  const now   = new Date();
  const days  = Math.floor((now - FOUNDING) / 86400000);
  const years = now.getFullYear() - 2025;
  const el    = document.getElementById('content');

  if (isAnniversary()) {
    el.classList.add('jubilee');
    document.getElementById('j-years').textContent = years;
    document.getElementById('j-label').textContent = years === 1 ? 'Jahr Docpier' : 'Jahre Docpier';
  } else {
    el.classList.remove('jubilee');
    document.getElementById('n-days').textContent = days.toLocaleString('de-CH');
  }
}

/* ── FIREWORKS ── */
const fwC = document.getElementById('fw');
const fwX = fwC.getContext('2d');
let parts = [], fwOn = false;
const COLORS = ['#3BF573','#00E5A0','#7B5CF5','#4d36d9','#ffffff','#3BF573'];

function resizeFW() { fwC.width=innerWidth; fwC.height=innerHeight; }
resizeFW(); addEventListener('resize', resizeFW);

function burst(x, y) {
  const col = COLORS[Math.floor(Math.random()*COLORS.length)];
  for (let i=0; i<65; i++) {
    const a=(i/65)*Math.PI*2, sp=2+Math.random()*5;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,alpha:1,
      r:1.5+Math.random()*2.5,color:col,g:.075+Math.random()*.04,dec:.012+Math.random()*.007});
  }
}

function fwLoop() {
  if (!fwOn) return;
  fwX.clearRect(0,0,fwC.width,fwC.height);
  parts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.vx*=.98; p.alpha-=p.dec;
    fwX.globalAlpha=Math.max(0,p.alpha);
    fwX.fillStyle=p.color;
    fwX.beginPath(); fwX.arc(p.x,p.y,p.r,0,Math.PI*2); fwX.fill();
  });
  fwX.globalAlpha=1;
  parts=parts.filter(p=>p.alpha>0);
  requestAnimationFrame(fwLoop);
}

function launchFW() {
  fwOn=true; parts=[]; fwLoop();
  let s=0;
  (function shoot(){
    if(s>=9){setTimeout(()=>{fwOn=false;fwX.clearRect(0,0,fwC.width,fwC.height)},2000);return;}
    burst(fwC.width*(0.15+Math.random()*.7), fwC.height*(0.08+Math.random()*.55));
    s++; setTimeout(shoot, 240+Math.random()*260);
  })();
}

/* ── KAMERA – startet automatisch, kein Tap nötig ── */
let vid, scanC, sctx, showing=false;
let posF=0, negF=0;
const SHOW=3, HIDE=5;

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ideal:'environment'}, width:{ideal:1920} }
    });
    vid = document.getElementById('video');
    vid.srcObject = stream;
    await vid.play();

    const loading = document.getElementById('loading');
    loading.classList.add('gone');
    setTimeout(()=> loading.style.display='none', 700);

    vid.classList.add('on');
    document.getElementById('ar').classList.add('on');
    document.getElementById('cam-hint').classList.add('on');

    scanC = document.getElementById('sc');
    sctx  = scanC.getContext('2d', {willReadFrequently:true});
    updateContent();
    setInterval(detect, 250);

  } catch(e) {
    // iOS/Android: Kamera braucht User-Gesture – Tap-Fallback
    const loading = document.getElementById('loading');
    loading.innerHTML = '<div class="tap-logo"><span class="dot"></span><span>docpier</span></div><div style="margin-top:2rem;font-family:Figtree,sans-serif;font-size:0.68rem;font-weight:500;color:rgba(255,255,255,0.25);letter-spacing:.14em;text-transform:uppercase;">Tippen zum Starten</div>';
    loading.style.cursor = 'pointer';
    loading.onclick = async () => {
      loading.onclick = null;
      loading.classList.add('gone');
      setTimeout(()=> loading.style.display='none', 600);
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video:{ facingMode:{ideal:'environment'}, width:{ideal:1920} }
        });
        vid = document.getElementById('video');
        vid.srcObject = stream;
        await vid.play();
        vid.classList.add('on');
        document.getElementById('ar').classList.add('on');
        document.getElementById('cam-hint').classList.add('on');
        scanC = document.getElementById('sc');
        sctx  = scanC.getContext('2d', {willReadFrequently:true});
        updateContent();
        setInterval(detect, 250);
      } catch(err) {
        updateContent(); showOverlay();
      }
    };
  }
}

function detect() {
  if(!vid||vid.readyState<2) return;
  const W=vid.videoWidth, H=vid.videoHeight; if(!W) return;

  // A4 Hochformat: Seitenverhältnis ~1:1.414
  // Wir prüfen 4 Zonen: Mitte + 4 Randbereiche
  const SIZE = 80;
  
  function sampleZone(sx, sy, sw, sh) {
    scanC.width = SIZE; scanC.height = SIZE;
    sctx.drawImage(vid, sx, sy, sw, sh, 0, 0, SIZE, SIZE);
    const d = sctx.getImageData(0, 0, SIZE, SIZE).data;
    let white = 0, total = d.length >> 2;
    for (let i = 0; i < d.length; i += 4) {
      const r=d[i], g=d[i+1], b=d[i+2];
      const bright = (r+g+b) / 3;
      const sat = Math.max(r,g,b) - Math.min(r,g,b);
      // Streng: sehr hell (>200) UND fast neutral (<20 Sättigung)
      if (bright > 200 && sat < 20) white++;
    }
    return white / total;
  }

  // A4 Hochformat: Breite ~60% des Screens, Höhe ~85% (Verhältnis 1:1.41)
  // Kamera zeigt typischerweise 16:9 → A4 nimmt ca. 60% Breite ein
  const a4w = W * 0.60;
  const a4h = a4w * 1.414;
  const a4x = (W - a4w) / 2;
  const a4y = (H - a4h) / 2;

  // Nur samplen wenn A4 ins Bild passt
  if (a4y < 0 || a4y + a4h > H) {
    // Fallback: ganzes Zentrum
    const r = sampleZone(W*0.2, H*0.1, W*0.6, H*0.8);
    if (!showing) {
      if (r > 0.75) { posF++; negF=0; if(posF>=SHOW) showOverlay(); }
      else posF = Math.max(0, posF-1);
    } else {
      if (r < 0.40) { negF++; posF=0; if(negF>=HIDE) hideOverlay(); }
      else negF = Math.max(0, negF-1);
    }
    return;
  }

  // Zone 1: Mitte des A4
  const rMid = sampleZone(a4x + a4w*0.25, a4y + a4h*0.25, a4w*0.5, a4h*0.5);
  // Zone 2: Oberer Rand
  const rTop = sampleZone(a4x + a4w*0.1, a4y + a4h*0.05, a4w*0.8, a4h*0.15);
  // Zone 3: Unterer Rand
  const rBot = sampleZone(a4x + a4w*0.1, a4y + a4h*0.80, a4w*0.8, a4h*0.15);
  // Zone 4: Linker Rand
  const rLeft = sampleZone(a4x + a4w*0.05, a4y + a4h*0.2, a4w*0.15, a4h*0.6);
  // Zone 5: Rechter Rand
  const rRight = sampleZone(a4x + a4w*0.80, a4y + a4h*0.2, a4w*0.15, a4h*0.6);

  // Alle Zonen müssen weiss sein → strenge UND-Bedingung
  const allWhite = rMid > 0.80 && rTop > 0.75 && rBot > 0.75 && rLeft > 0.75 && rRight > 0.75;
  // Für hide: mindestens eine Zone nicht mehr weiss
  const notWhite = rMid < 0.50 || rTop < 0.45 || rBot < 0.45;

  if (!showing) {
    if (allWhite) { posF++; negF=0; if(posF>=SHOW) showOverlay(); }
    else posF = Math.max(0, posF-1);
  } else {
    if (notWhite) { negF++; posF=0; if(negF>=HIDE) hideOverlay(); }
    else negF = Math.max(0, negF-1);
  }
}

function showOverlay() {
  showing=true; posF=0;
  updateContent();
  document.getElementById('vf').classList.add('locked');
  document.getElementById('content').classList.add('show');
  document.getElementById('cam-hint').style.opacity='0';
  if(isAnniversary()) setTimeout(launchFW, 500);
}

function hideOverlay() {
  showing=false; negF=0;
  document.getElementById('content').classList.remove('show');
  document.getElementById('vf').classList.remove('locked');
  document.getElementById('cam-hint').style.opacity='1';
}

setInterval(()=>{ if(showing) updateContent(); }, 60000);

// Kamera sofort starten
startCamera();
</script>
</body>
</html>
